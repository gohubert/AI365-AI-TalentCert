<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>練習結果 — 公務AI共通核心能力認證</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .result-wrapper {
      max-width: 800px; margin: 0 auto; padding: 30px;
    }
    .result-header {
      text-align: center; margin-bottom: 30px;
    }
    .result-icon { font-size: 4rem; margin-bottom: 10px; }
    .result-score {
      font-size: 3rem; font-weight: 800;
    }
    .result-score.passed { color: var(--success); }
    .result-score.failed { color: var(--danger); }
    .result-label { font-size: 1.1rem; color: var(--text-secondary); margin-top: 4px; }

    .result-stats {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 12px; margin: 24px 0;
    }
    .stat-card {
      background: var(--bg-card); border-radius: 10px; padding: 16px;
      text-align: center; box-shadow: 0 1px 6px rgba(0,0,0,0.05);
    }
    .stat-value { font-size: 1.8rem; font-weight: 800; color: var(--text-primary); }
    .stat-label { font-size: 0.8rem; color: var(--text-light); margin-top: 4px; }

    .review-section { margin-top: 30px; }
    .review-section h3 { margin-bottom: 16px; font-size: 1.1rem; }
    .review-item {
      background: var(--bg-card); border-radius: 10px; padding: 16px 20px;
      margin-bottom: 10px; display: flex; align-items: flex-start; gap: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    }
    .review-badge {
      min-width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 0.8rem; color: #fff; flex-shrink: 0;
    }
    .review-badge.correct { background: var(--success); }
    .review-badge.wrong { background: var(--danger); }
    .review-detail { flex: 1; }
    .review-q { font-size: 0.92rem; line-height: 1.6; margin-bottom: 4px; }
    .review-answer { font-size: 0.82rem; color: var(--text-light); }

    .result-actions {
      display: flex; gap: 12px; justify-content: center; margin-top: 30px;
    }
  </style>
</head>
<body>
  <header class="top-banner">
    <div class="brand-logo"><span class="logo-text"><span class="logo-accent">AI</span>TalentCert</span></div>
    <div class="banner-title">
      <h1>公務AI共通核心能力認證</h1>
      <div class="subtitle">模擬練習結果 — Practice Results</div>
    </div>
  </header>

  <div class="main-content" style="align-items:stretch;">
    <div class="result-wrapper" id="resultWrapper">
      <div class="result-header">
        <div class="result-icon" id="resultIcon">✅</div>
        <div class="result-score" id="resultScore">0</div>
        <div class="result-label" id="resultLabel">模擬練習成績</div>
      </div>

      <div class="result-stats" id="resultStats"></div>

      <div class="result-actions">
        <button class="btn btn-primary" id="btnRetry">🔄 再練一次</button>
        <button class="btn btn-secondary" id="btnHome">🏠 返回首頁</button>
      </div>

      <div class="review-section">
        <h3>📋 逐題檢討</h3>
        <div id="reviewContainer"></div>
      </div>
    </div>
  </div>

  <script src="js/practice-result.js"></script>
</body>
</html>
